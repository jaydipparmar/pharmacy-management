services:
  - type: web
    name: smart-pharmacy
    runtime: java
    plan: free
    buildCommand: mvn clean install -DskipTests
    startCommand: java -jar target/smart-pharmacy-0.0.1-SNAPSHOT.jar
    envVars:
      - key: JAVA_OPTS
        value: -Xmx512m
      - key: SPRING_PROFILES_ACTIVE
        value: prod
